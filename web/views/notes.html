<div class="h-full flex flex-col gap-6">
    
    <!-- Tiêu đề -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between bg-card p-6 rounded-2xl border border-border shadow-lg gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-white flex items-center gap-3">
                <img src="assets/icons/menu-notes.png" class="w-8 h-8 object-contain"> Tàng Kinh Các
            </h1>
            <p class="text-gray-400 mt-1">Nơi lưu trữ các bí kíp, tâm đắc và kiến thức nhặt được trên con đường tu tiên.</p>
        </div>
        <div class="flex gap-4 items-center">
            <div class="hidden sm:block bg-dark px-5 py-2.5 rounded-xl border border-border text-center min-w-[120px]">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Tổng bí tịch</p>
                <p id="note-stat-total" class="text-2xl font-bold text-white mt-1">0</p>
            </div>
            <button onclick="toggleNoteForm()" title="Viết ghi chú mới" class="w-11 h-11 bg-primary hover:bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-primary/20 transition-all flex items-center justify-center border border-blue-500/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </div>

    <!-- Cửa sổ Thêm Note (Inline Form) -->
    <div id="note-form" class="hidden bg-card p-5 md:p-6 mb-6 rounded-2xl border border-primary/30 shadow-xl shadow-primary/5 animate-slide-down">
        <form class="flex flex-col gap-4" onsubmit="event.preventDefault(); addNote();">
            <input type="text" id="note-title" placeholder="Tiêu đề ghi chú (không bắt buộc)" 
                   class="w-full bg-dark text-gray-100 border border-border rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition-colors text-base font-medium"
                   autocomplete="off">
            <textarea id="note-content" placeholder="Dán thẻ nhớ/code snippet vào đây..." rows="5"
                      class="w-full bg-dark text-gray-300 border border-border rounded-xl px-4 py-3 focus:outline-none focus:border-primary transition-colors custom-scrollbar resize-y text-sm font-mono" required></textarea>
            
            <div class="flex justify-end gap-3 mt-2 border-t border-border pt-4">
                <button type="button" onclick="toggleNoteForm()" class="px-5 py-2.5 rounded-xl font-bold text-sm text-gray-400 hover:text-white bg-dark border border-gray-700 transition-colors">Hủy</button>
                <button type="submit" id="btn-save-note" class="bg-primary hover:bg-blue-600 text-white font-semibold flex items-center gap-2 px-6 py-2.5 rounded-xl transition-all shadow-md active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    Lưu ngay
                </button>
            </div>
        </form>
    </div>

    <!-- Vùng danh sách ghi chú (Grid) -->
    <div class="flex-1 overflow-y-auto px-1 py-1 custom-scrollbar">
        <!-- Empty state (Mặc định ẩn) -->
        <div id="note-empty" class="hidden flex flex-col items-center justify-center h-40 text-center opacity-60">
            <img src="assets/icons/empty-state.png" class="w-20 h-20 object-contain mb-4 opacity-50">
            <p class="text-gray-300 text-lg font-medium">Kệ sách đang trống</p>
            <p class="text-gray-500 text-sm mt-1">Hãy bắt đầu viết bí kíp đầu tiên của bạn!</p>
        </div>
        
        <!-- Grid Container -->
        <div id="note-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-max">
            <!-- Nội dung sinh bằng JS -->
        </div>
    </div>
</div>

<style>
/* CSS bổ trợ cho mượt mà */
.note-card { transition: all 0.2s ease; }
.note-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); border-color: rgba(59, 130, 246, 0.4); }

.note-content-area {
    /* Đảm bảo giữ nguyên khoảng trắng và cho phép cuộn nội dung dài */
    white-space: pre-wrap; 
    word-break: break-word;
}

@keyframes scaleUp {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
}
.animate-scale-up { animation: scaleUp 0.3s ease-out forwards; }
</style>
