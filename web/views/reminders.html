<div class="flex flex-col sm:flex-row sm:items-center justify-between bg-card p-6 rounded-2xl border border-border shadow-lg gap-4 mb-6">
    <div>
        <h1 class="text-2xl font-bold text-white flex items-center gap-3">
            <img src="assets/icons/menu-reminder.png" class="w-8 h-8 object-contain"> Linh Hạc Truyền Tin
        </h1>
        <p class="text-gray-400 mt-1">Cài đặt các linh hạc tự động nhắc nhở đạo hữu theo chu kỳ.</p>
    </div>
    <button onclick="toggleReminderForm()" title="Thêm chu kỳ nhắc mới" class="w-11 h-11 bg-primary hover:bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-primary/20 transition-all flex items-center justify-center border border-blue-500/50">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
</div>

<div id="reminder-form" class="hidden bg-card p-5 md:p-6 mx-auto mb-6 rounded-2xl border border-primary/30 shadow-xl shadow-primary/5 animate-slide-down">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-4">
        <div>
            <label class="block text-sm font-semibold text-gray-400 mb-2">Tiêu đề (Trên thông báo Windows)</label>
            <input id="rem-title" type="text" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:border-primary outline-none transition-all placeholder-gray-500" placeholder="VD: Uống miếng nước">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-400 mb-2">Nhắc lại sau mỗi (Phút)</label>
            <input id="rem-interval" type="number" min="1" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:border-primary outline-none transition-all placeholder-gray-500 font-mono" placeholder="Ví dụ: 60 (Tức là 1 tiếng)">
        </div>
        <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-400 mb-2">Nội dung chi tiết (Message)</label>
            <textarea id="rem-msg" class="w-full bg-dark border border-gray-700 rounded-lg px-4 py-3 text-gray-100 focus:border-primary outline-none transition-all placeholder-gray-500 h-24" placeholder="Đứng dậy vươn vai thư giãn 2 phút để giải cơ mỏi cổ nào!"></textarea>
        </div>
    </div>
    <div class="flex gap-3 justify-end pt-4 border-t border-border mt-2">
        <button onclick="toggleReminderForm()" class="px-5 py-2 font-bold text-gray-500 hover:text-gray-300 transition-colors bg-gray-800/50 rounded-lg border border-gray-700">Đóng form</button>
        <button onclick="addReminder()" id="btn-save-rem" class="px-8 py-2 bg-primary hover:bg-blue-600 rounded-lg font-bold text-white shadow-md shadow-primary/30 transition-all border border-blue-400/50">Lưu tiến trình báo</button>
    </div>
</div>

<div id="reminder-empty" class="hidden mt-24 text-center text-gray-500 flex flex-col items-center justify-center">
    <img src="assets/icons/empty-state.png" class="w-24 h-24 object-contain mb-6 opacity-40">
    <p class="text-lg font-medium text-gray-400">Chưa có "chiếc đồng hồ" nào đang đếm ngược cả.</p>
</div>

<div id="reminder-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
    <!-- Render reminders via JS -->
</div>
